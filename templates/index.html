<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Granizados - Sistema de Auditoría Avanzada</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #21262d;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .status-badge {
            font-weight: bold;
            font-size: 1.1em;
            background-color: #161b22;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h3 { margin: 0 0 10px 0; color: #8b949e; }
        .card .value { font-size: 2.2em; font-weight: bold; color: #58a6ff; }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #30363d;
        }
        th { background-color: #21262d; color: #f0f6fc; }
        tr:hover { background-color: #1f242c; }
        
        /* Estilos del botón de Auditoría Visual */
        .btn-foto {
            background-color: #1f6feb;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-foto:hover {
            background-color: #388bfd;
        }
        .no-foto {
            color: #8b949e;
            font-style: italic;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>📊 Monitoreo Inteligente con Captura de Evidencia</h2>
        <div class="status-badge" id="conexion-status">
            <span style="color: #ff9900;">• CONECTANDO...</span>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h3>Total Despachos</h3>
            <div class="value" id="total-despachos">0</div>
        </div>
        <div class="card">
            <h3>Venta Bruta</h3>
            <div class="value" id="venta-total" style="color: #2ea043;">$0</div>
        </div>
        <div class="card">
            <h3>Comisiones Acumuladas</h3>
            <div class="value" id="comision-total" style="color: #f9826c;">$0</div>
        </div>
    </div>

    <h3>📋 Registro de Actividad y Auditoría</h3>
    <table>
        <thead>
            <tr>
                <th>Hora (Colombia)</th>
                <th>Método de Conteo</th>
                <th>Valor Venta</th>
                <th>Comisión</th>
                <th>Evidencia Visual</th>
            </tr>
        </thead>
        <tbody id="registro-actividad">
            <tr>
                <td colspan="5" style="text-align: center; color: #8b949e;">Esperando datos del sistema...</td>
            </tr>
        </tbody>
    </table>

    <script>
        async function actualizarDashboard() {
            try {
                // Consultamos las ventas del backend en Render
                const response = await fetch('/get_data');
                const datos = await response.json();

                if (datos.status === "success") {
                    // Colocar estado activo en vivo
                    document.getElementById('conexion-status').innerHTML = '<span style="color: #00ff88;">• SISTEMA EN VIVO</span>';

                    let totalDespachos = datos.ventas.length;
                    let ventaTotal = 0;
                    let comisionTotal = 0;

                    const tablaBody = document.getElementById('registro-actividad');
                    tablaBody.innerHTML = '';

                    if (totalDespachos === 0) {
                        tablaBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Sin despachos registrados hoy.</td></tr>';
                    } else {
                        // Invertir la lista para mostrar las ventas más recientes arriba de la tabla
                        [...datos.ventas].reverse().forEach(venta => {
                            ventaTotal += Number(venta.valor_venta);
                            comisionTotal += Number(venta.comision_empleado);

                            // Formatear Timestamp de Firebase a hora local de Colombia de forma limpia
                            const fechaObj = new Date(venta.timestamp);
                            const horaLocal = fechaObj.toLocaleTimeString('es-CO', {
                                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
                            });

                            // Validar si la venta contiene enlace a foto guardada en Storage
                            const celdaFoto = venta.foto_url 
                                ? `<a class="btn-foto" href="${venta.foto_url}" target="_blank">📸 Ver Captura</a>`
                                : `<span class="no-foto">Sin captura</span>`;

                            const fila = document.createElement('tr');
                            fila.innerHTML = `
                                <td>${horaLocal}</td>
                                <td><strong style="color: #58a6ff;">${venta.metodo || 'Automático'}</strong></td>
                                <td>$${Number(venta.valor_venta).toLocaleString('es-CO')}</td>
                                <td>$${Number(venta.comision_empleado).toLocaleString('es-CO')}</td>
                                <td>${celdaFoto}</td>
                            `;
                            tablaBody.appendChild(fila);
                        });
                    }

                    // Actualizar los tres contadores de las tarjetas superiores
                    document.getElementById('total-despachos').innerText = totalDespachos;
                    document.getElementById('venta-total').innerText = '$' + ventaTotal.toLocaleString('es-CO');
                    document.getElementById('comision-total').innerText = '$' + comisionTotal.toLocaleString('es-CO');
                }
            } catch (error) {
                console.error("Error al consultar el servidor:", error);
                document.getElementById('conexion-status').innerHTML = '<span style="color: #ff3333;">• ERROR DE SEÑAL</span>';
            }
        }

        // Ejecución inmediata inicial
        actualizarDashboard();

        // Refrescar de forma automatizada y transparente cada 5 segundos
        setInterval(actualizarDashboard, 5000);
    </script>
</body>
</html>
